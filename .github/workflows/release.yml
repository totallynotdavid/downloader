name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    environment:
      name: publishing

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: "1.3.11"

      - uses: biomejs/setup-biome@a5c9de832021eb6b89f77ef8ec964d024b468c75 # v2.7.1
        with:
          version: "2.5.0"

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - run: npm install -g npm@latest

      # npm publish relies on prepublishOnly to build publish artifacts.
      - run: npm publish

  github:
    needs: publish
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: softprops/action-gh-release@9ed3cf9a6863b31f005d951c8d19de20628cf4eb # v3.0.0
        with:
          generate_release_notes: true
